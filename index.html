  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 1】菜单
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const MENU = [
  {
    group: '基础配置',
    items: [
      { key: 'channels', label: '渠道管理', icon: '◈', active: true },
      { key: 'fields',   label: '字段配置', icon: '≡' },
    ]

    group: '凭证管理',
    items: [
      { key: 'credentials', label: '凭证录入', icon: '🔑' },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  { key: 'name',          label: '渠道名称', cls: 'font-medium text-gray-900' },
  { key: 'type',          label: '接入类型', render: v => <span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded">{v}</span> },
  { key: 'intStatus',     label: '接入状态', render: v => <StatusBadge status={v}/> },
  { key: 'onlineStatus',  label: '上线状态', render: v => <OnlineBadge status={v}/> },
  { key: 'completeness',  label: '凭证完整度', render: (v, row) => <ProgressBar filled={row.filled} total={row.total}/> },
  { key: 'expiredAt',     label: '截止日期',  render: (v, row) => {
    const expiring = v !== '-' && new Date(v) < new Date(Date.now() + 30*86400000);
    return <span className={`text-xs ${expiring ? 'text-red-500 font-medium' : 'text-gray-400'}`}>{expiring ? '⚠ ' : ''}{v}</span>;
  }},
  { key: 'updatedAt',     label: '最后更新',  render: (v, row) => <span className="text-xs text-gray-400">{v}<br/>{row.operator}</span> },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 3】筛选项
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  { key: 'intStatus',    label: '接入状态', options: [['','全部'],['connected','已接入'],['pending','接入中'],['unknown','未知']] },
  { key: 'onlineStatus', label: '上线状态', options: [['','全部'],['online','已上线'],['offline','已下线'],['unknown','未知']] },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const INIT_DATA = [

  { id:2, name:'PayPal',        type:'API',  intStatus:'connected', onlineStatus:'online',  filled:3, total:4, expiredAt:'2027-03-15', updatedAt:'2026-01-20', operator:'李四' },
  { id:3, name:'Stripe',        type:'API',  intStatus:'pending',   onlineStatus:'online',  filled:2, total:6, expiredAt:'2026-12-31', updatedAt:'2026-01-15', operator:'张三' },
  { id:4, name:'SWIFT 银行转账', type:'SFTP', intStatus:'connected', onlineStatus:'offline', filled:5, total:5, expiredAt:'2025-12-10', updatedAt:'2025-12-10', operator:'王五' },
  { id:5, name:'Alipay HK',     type:'API',  intStatus:'unknown',   onlineStatus:'online',  filled:1, total:4, expiredAt:'2026-08-01', updatedAt:'2026-01-08', operator:'李四' },
  { id:6, name:'GrabPay',       type:'API',  intStatus:'pending',   onlineStatus:'unknown', filled:2, total:4, expiredAt:'2027-01-01', updatedAt:'2026-03-01', operator:'张三' },
  { id:7, name:'Payermax',      type:'API',  intStatus:'connected', onlineStatus:'online',  filled:4, total:4, expiredAt:'2027-09-30', updatedAt:'2026-02-18', operator:'王五' },
  { id:8, name:'Unipin',        type:'SFTP', intStatus:'pending',   onlineStatus:'unknown', filled:0, total:3, expiredAt:'-',         updatedAt:'2026-03-10', operator:'李四' },

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const INT_STATUS_MAP = {
  connected: { label:'已接入', dot:'bg-green-500',       cls:'bg-green-50 text-green-700 border border-green-200' },
  pending:   { label:'接入中', dot:'bg-blue-500 animate-pulse', cls:'bg-blue-50 text-blue-600 border border-blue-200' },
  unknown:   { label:'未知',   dot:'bg-gray-400',         cls:'bg-gray-100 text-gray-500 border border-gray-200' },
};
const ONLINE_STATUS_MAP = {
  online:  { label:'已上线', dot:'bg-green-500', cls:'bg-green-50 text-green-700 border border-green-200' },
  offline: { label:'已下线', dot:'bg-gray-400',  cls:'bg-gray-100 text-gray-500 border border-gray-200' },
  unknown: { label:'未知',   dot:'bg-gray-400',  cls:'bg-gray-100 text-gray-500 border border-gray-200' },
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【替换区 6】新增/编辑表单
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FORM_FIELDS = [
  { key:'name',         label:'渠道名称', type:'text' },
  { key:'type',         label:'接入类型', type:'select', options:['API','SFTP','其他'] },
  { key:'intStatus',    label:'接入状态', type:'select', options:[{v:'connected',l:'已接入'},{v:'pending',l:'接入中'},{v:'unknown',l:'未知'}] },
  { key:'onlineStatus', label:'上线状态', type:'select', options:[{v:'online',l:'已上线'},{v:'offline',l:'已下线'},{v:'unknown',l:'未知'}] },
  { key:'expiredAt',    label:'截止日期', type:'date' },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 凭证字段（详情页用，Lapay 示例）
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CRED_FIELDS = [
  { key:'merchant_no',          label:'商户号',   sensitive:false, required:true,  filled:true,  value:'LPY-8823-CNY',             updatedAt:'2026-02-01', operator:'张三', version:2 },
  { key:'merchant_private_key', label:'商户私钥', sensitive:true,  required:true,  filled:true,  value:'',                         updatedAt:'2026-02-01', operator:'张三', version:3 },
  { key:'platform_public_key',  label:'平台公钥', sensitive:true,  required:true,  filled:true,  value:'',                         updatedAt:'2026-01-20', operator:'张三', version:1 },
  { key:'endpoint',             label:'接口地址', sensitive:false, required:true,  filled:true,  value:'https://api.lapay.com/v2', updatedAt:'2026-01-15', operator:'李四', version:1 },
  { key:'doc_username',         label:'文档账号', sensitive:false, required:false, filled:false, value:'', updatedAt:'-', operator:'-', version:0 },
  { key:'doc_password',         label:'文档密码', sensitive:true,  required:false, filled:false, value:'', updatedAt:'-', operator:'-', version:0 },
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 【固定区】以下代码保持不变
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PAGE_SIZE = 6;

function StatusBadge({ status }) {
  const cfg = INT_STATUS_MAP[status] || INT_STATUS_MAP.unknown;
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${cfg.cls}`}><span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}></span>{cfg.label}</span>;
}
function OnlineBadge({ status }) {
  const cfg = ONLINE_STATUS_MAP[status] || ONLINE_STATUS_MAP.unknown;
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${cfg.cls}`}><span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}></span>{cfg.label}</span>;
}
function ProgressBar({ filled, total }) {
  const pct = total === 0 ? 0 : Math.round(filled / total * 100);
  const color = pct === 100 ? 'bg-green-500' : pct >= 50 ? 'bg-blue-500' : 'bg-red-400';
  const text  = pct === 100 ? 'text-green-600' : pct >= 50 ? 'text-blue-600' : 'text-red-500';
  return (
    <div className="flex items-center gap-2">
      <div className="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden" style={{minWidth:56}}>
        <div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}></div>
      </div>
      <span className={`text-xs font-medium ${text}`}>{filled}/{total}</span>
    </div>
  );
}

function Modal({ title, onClose, children, footer }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div className="bg-white rounded-xl shadow-2xl w-[480px] overflow-hidden">
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <span className="font-semibold text-gray-800">{title}</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>
        <div className="px-5 py-4">{children}</div>
        {footer && <div className="flex justify-end gap-2 px-5 py-3 border-t border-gray-100 bg-gray-50">{footer}</div>}
      </div>
    </div>
  );
}

function Toast({ msg, type }) {
  if (!msg) return null;
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 ${type==='success'?'bg-green-600':'bg-gray-800'} text-white text-sm px-5 py-2.5 rounded-lg shadow-lg z-[9999]`}>{msg}</div>;
}

function Sidebar({ activeKey, onSelect }) {
  return (
    <aside className="w-52 flex-shrink-0 flex flex-col h-screen bg-[#18181b] text-zinc-400">
      <div className="flex items-center gap-2.5 px-4 py-4 border-b border-zinc-800">
        <div className="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center text-white text-sm">🔐</div>
        <span className="text-white text-sm font-semibold">账号管理系统</span>
      </div>
      <nav className="flex-1 py-3 overflow-y-auto">
        {MENU.map(({ group, items }) => (
          <div key={group} className="mb-2">
            <div className="px-4 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-wider">{group}</div>
            {items.map(item => {
              const isActive = item.key === activeKey;
              return (
                <button key={item.key} onClick={() => onSelect(item.key)}
                  className={`w-full flex items-center gap-2.5 px-4 py-2 text-sm transition-colors ${isActive ? 'bg-zinc-700 text-white' : 'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200'}`}>
                  <span className="w-5 text-center">{item.icon}</span>{item.label}
                  {isActive && <span className="ml-auto w-1 h-4 bg-blue-500 rounded-full"></span>}
                </button>
              );
            })}
          </div>
        ))}
      </nav>
      <div className="px-4 py-3 border-t border-zinc-800 flex items-center gap-2.5">
        <div className="w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-semibold">张</div>
        <div><div className="text-zinc-200 text-xs font-medium">张三</div><div className="text-zinc-500 text-xs">财务运维</div></div>
      </div>
    </aside>
  );
}

// ── 渠道列表页 ────────────────────────────────────────
function ChannelListPage({ onViewDetail, showToast }) {
  const [search, setSearch]   = useState('');
  const [filters, setFilters] = useState({});
  const [page, setPage]       = useState(1);
  const [selected, setSelected] = useState([]);
  const [modal, setModal]     = useState(null);
  const [editRow, setEditRow] = useState(null);
  const [data, setData]       = useState(INIT_DATA);

  const filtered = data.filter(r => {
    if (search && !r.name.toLowerCase().includes(search.toLowerCase())) return false;
    for (const [k, v] of Object.entries(filters)) { if (v && r[k] !== v) return false; }
    return true;
  });
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const paginated = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const toggleAll = () => setSelected(s => s.length===paginated.length ? [] : paginated.map(r=>r.id));
  const toggleRow = id => setSelected(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  const hasFilter = search || Object.values(filters).some(Boolean);

  const confirmSave = () => {
    if (modal==='add') { const id=Math.max(...data.map(r=>r.id))+1; setData(d=>[...d,{...editRow,id,filled:0,total:0,updatedAt:new Date().toISOString().slice(0,10),operator:'张三'}]); }
    else setData(d=>d.map(r=>r.id===editRow.id?{...r,...editRow}:r));
    setModal(null); showToast(modal==='add'?'✓ 渠道已新增':'✓ 修改已保存','success');
  };

  // 统计卡
  const stats = [
    { label:'渠道总数',  value:data.length,                                         unit:'个', color:'text-gray-900',   sub:'第一阶段海外支付' },
    { label:'已接入',    value:data.filter(c=>c.intStatus==='connected').length,    unit:'个', color:'text-green-600',  sub:'↑2 较上月' },
    { label:'凭证待补',  value:data.filter(c=>c.filled<c.total).length,            unit:'个', color:'text-yellow-600', sub:'有字段未填写' },
    { label:'即将到期',  value:data.filter(c=>c.expiredAt!=='-'&&new Date(c.expiredAt)<new Date(Date.now()+30*86400000)).length, unit:'个', color:'text-red-500', sub:'30天内到期' },
  ];

  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-4 bg-white border-b border-gray-200 flex-shrink-0">
        <h1 className="text-base font-semibold text-gray-900">渠道管理</h1>
        <p className="text-xs text-gray-400 mt-0.5">管理海外支付渠道凭证</p>
      </div>
      <div className="flex-1 overflow-auto px-6 py-4">

        {/* 统计卡 */}
        <div className="grid grid-cols-4 gap-4 mb-4">
          {stats.map(s => (
            <div key={s.label} className="bg-white border border-gray-200 rounded-lg px-4 py-3">
              <div className="text-xs text-gray-500 mb-1">{s.label}</div>
              <div className={`text-2xl font-bold ${s.color}`}>{s.value}<span className="text-sm font-normal text-gray-400 ml-1">{s.unit}</span></div>
              <div className="text-xs text-gray-400 mt-0.5">{s.sub}</div>
            </div>
          ))}
        </div>

        {/* 筛选条 */}
        <div className="bg-white border border-gray-200 rounded-lg px-4 py-3 mb-3 flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-md px-3 h-8 focus-within:border-blue-400 focus-within:bg-white transition-colors">
            <span className="text-gray-400 text-sm">🔍</span>
            <input className="bg-transparent text-sm outline-none w-36 placeholder:text-gray-400" placeholder="搜索渠道名称..."
              value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>
          {FILTERS.map(f => (
            <div key={f.key} className="flex items-center gap-1.5">
              <span className="text-xs text-gray-500">{f.label}</span>
              <select className="h-8 border border-gray-200 rounded-md px-2 text-sm bg-white focus:outline-none focus:border-blue-400"
                value={filters[f.key]||''} onChange={e=>{setFilters(fs=>({...fs,[f.key]:e.target.value}));setPage(1);}}>
                {f.options.map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          ))}
          {hasFilter && <button onClick={()=>{setSearch('');setFilters({});setPage(1);}} className="text-xs text-blue-500 hover:text-blue-700">重置</button>}
          <span className="ml-auto text-xs text-gray-400">共 {total} 条</span>
        </div>

        {/* 操作按钮 */}
        <div className="flex items-center gap-2 mb-3">
          <button onClick={()=>{setEditRow({name:'',type:'API',intStatus:'pending',onlineStatus:'unknown',expiredAt:''});setModal('add');}}
            className="flex items-center gap-1.5 px-3 h-8 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded-md transition-colors">
            ＋ 新增渠道
          </button>
          <button onClick={()=>showToast('已导出 Excel')} className="px-3 h-8 bg-white border border-gray-200 hover:border-blue-400 hover:text-blue-500 text-sm text-gray-600 rounded-md transition-colors">↓ 导出</button>
          {selected.length>0 && (
            <button onClick={()=>{setData(d=>d.filter(r=>!selected.includes(r.id)));setSelected([]);showToast(`✓ 已删除 ${selected.length} 条`,'success');}}
              className="px-3 h-8 bg-white border border-red-200 hover:bg-red-50 text-red-500 text-sm rounded-md transition-colors">
              🗑 删除所选 ({selected.length})
            </button>
          )}
        </div>

        {/* 表格 */}
        <div className="bg-white border border-gray-200 rounded-lg overflow-hidden">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 border-b border-gray-200">
                <th className="w-10 px-4 py-3"><input type="checkbox" className="rounded" checked={selected.length===paginated.length&&paginated.length>0} onChange={toggleAll}/></th>
                {COLUMNS.map(c=><th key={c.key} className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">{c.label}</th>)}
                <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide">操作</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {paginated.length===0 ? (
                <tr><td colSpan={COLUMNS.length+2} className="text-center py-12 text-gray-400 text-sm">暂无数据</td></tr>
              ) : paginated.map(row=>(
                <tr key={row.id} className={`hover:bg-gray-50 transition-colors cursor-pointer ${selected.includes(row.id)?'bg-blue-50':''}`} onClick={()=>onViewDetail(row)}>
                  <td className="px-4 py-3" onClick={e=>e.stopPropagation()}><input type="checkbox" className="rounded" checked={selected.includes(row.id)} onChange={()=>toggleRow(row.id)}/></td>
                  {COLUMNS.map(c=>(
                    <td key={c.key} className={`px-4 py-3 ${c.cls||''}`}>
                      {c.render ? c.render(row[c.key], row) : row[c.key]}
                    </td>
                  ))}
                  <td className="px-4 py-3" onClick={e=>e.stopPropagation()}>
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={()=>onViewDetail(row)} className="px-2.5 py-1 text-xs text-blue-500 hover:bg-blue-50 rounded">查看凭证</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>{setEditRow({...row});setModal('edit');}} className="px-2.5 py-1 text-xs text-gray-500 hover:bg-gray-100 rounded">编辑</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>{setEditRow(row);setModal('delete');}} className="px-2.5 py-1 text-xs text-red-400 hover:bg-red-50 rounded">删除</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* 分页 */}
        <div className="flex items-center justify-between mt-3 px-1">
          <span className="text-xs text-gray-400">第 {Math.min((page-1)*PAGE_SIZE+1,total)}–{Math.min(page*PAGE_SIZE,total)} 条，共 {total} 条</span>
          <div className="flex items-center gap-1">
            {[{l:'«',a:()=>setPage(1),d:page===1},{l:'‹',a:()=>setPage(p=>p-1),d:page===1}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 hover:border-blue-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed">{b.l}</button>
            ))}
            {Array.from({length:totalPages},(_,i)=>i+1)
              .filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1)
              .reduce((acc,p,i,arr)=>{if(i>0&&p-arr[i-1]>1)acc.push('…');acc.push(p);return acc;},[])
              .map((p,i)=>p==='…'
                ?<span key={`e${i}`} className="w-8 h-8 flex items-center justify-center text-xs text-gray-400">…</span>
                :<button key={p} onClick={()=>setPage(p)} className={`w-8 h-8 flex items-center justify-center text-xs rounded border transition-colors ${p===page?'bg-blue-500 text-white border-blue-500':'border-gray-200 text-gray-600 hover:border-blue-400 hover:text-blue-500'}`}>{p}</button>
              )}
            {[{l:'›',a:()=>setPage(p=>p+1),d:page===totalPages},{l:'»',a:()=>setPage(totalPages),d:page===totalPages}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 hover:border-blue-400 hover:text-blue-500 disabled:opacity-30 disabled:cursor-not-allowed">{b.l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 新增/编辑 */}
      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'新增渠道':'编辑渠道'} onClose={()=>setModal(null)}
          footer={<>
            <button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
            <button onClick={confirmSave} className="px-4 h-8 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-md">确认</button>
          </>}>
          <div className="space-y-3">
            {FORM_FIELDS.map(f=>(
              <div key={f.key} className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">{f.label}</label>
                {f.type==='select'
                  ? <select className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white" value={editRow?.[f.key]||''} onChange={e=>setEditRow(r=>({...r,[f.key]:e.target.value}))}>
                      <option value="">请选择</option>
                      {f.options.map(o=>typeof o==='string'?<option key={o}>{o}</option>:<option key={o.v} value={o.v}>{o.l}</option>)}
                    </select>
                  : <input type={f.type} className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400" value={editRow?.[f.key]||''} onChange={e=>setEditRow(r=>({...r,[f.key]:e.target.value}))}/>
                }
              </div>
            ))}
          </div>
        </Modal>
      )}
      {modal==='delete' && (
        <Modal title="确认删除" onClose={()=>setModal(null)}
          footer={<>
            <button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
            <button onClick={()=>{setData(d=>d.filter(r=>r.id!==editRow.id));setModal(null);showToast('✓ 已删除','success');}} className="px-4 h-8 text-sm bg-red-500 hover:bg-red-600 text-white rounded-md">确认删除</button>
          </>}>
          <p className="text-sm text-gray-600">确定删除 <strong>「{editRow?.name}」</strong> 吗？</p>
        </Modal>
      )}
    </main>
  );
}

// ── 渠道凭证详情页 ────────────────────────────────────
function CredDetailPage({ channel, onBack, showToast }) {
  const [fields, setFields] = useState(CRED_FIELDS);
  const [credModal, setCredModal] = useState(null);
  const [inputVal, setInputVal] = useState('');
  const filled = fields.filter(f=>f.filled).length;
  const pct = Math.round(filled/fields.length*100);

  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-4 bg-white border-b border-gray-200 flex items-center gap-3 flex-shrink-0">
        <button onClick={onBack} className="text-gray-400 hover:text-blue-500 text-lg transition-colors leading-none">←</button>
        <div>
          <h1 className="text-base font-semibold text-gray-900">{channel.name} · 渠道凭证详情</h1>
          <p className="text-xs text-gray-400 mt-0.5">渠道管理 / 凭证详情</p>
        </div>
      </div>
      <div className="flex-1 overflow-auto px-6 py-4 space-y-4">

        {/* 基础信息 */}
        <div className="bg-white border border-gray-200 rounded-lg">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div className="flex items-center gap-2"><span className="w-0.5 h-4 bg-blue-500 rounded-full block"></span><span className="font-semibold text-sm">基础信息</span></div>
            <div className="flex gap-2">
              <button className="px-3 h-7 text-xs border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
              <button onClick={()=>showToast('✓ 已保存','success')} className="px-3 h-7 text-xs bg-blue-500 text-white rounded-md">保存修改</button>
            </div>
          </div>
          <div className="px-5 py-4 grid grid-cols-3 gap-4 text-sm">
            {[
              {label:'渠道名称',defaultValue:channel.name,type:'text'},
              {label:'接入类型',defaultValue:channel.type,type:'text'},
            ].map(f=>(
              <div key={f.label} className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">{f.label}</label>
                <input type={f.type} defaultValue={f.defaultValue} className="h-8 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400"/>
              </div>
            ))}
            <div className="flex flex-col gap-1"><label className="text-xs text-gray-500">接入状态</label>
              <select defaultValue={channel.intStatus} className="h-8 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white">
                <option value="connected">已接入</option><option value="pending">接入中</option><option value="unknown">未知</option>
              </select>
            </div>
            <div className="flex flex-col gap-1"><label className="text-xs text-gray-500">上线状态</label>
              <select defaultValue={channel.onlineStatus} className="h-8 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white">
                <option value="online">已上线</option><option value="offline">已下线</option><option value="unknown">未知</option>
              </select>
            </div>
            <div className="flex flex-col gap-1"><label className="text-xs text-gray-500">截止日期</label>
              <input type="date" defaultValue={channel.expiredAt} className="h-8 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400"/>
            </div>
            <div className="flex flex-col gap-1 col-span-2"><label className="text-xs text-gray-500">备注</label>
              <input type="text" defaultValue="主要用于东南亚市场，支持 PHP/VND/THB" className="h-8 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400"/>
            </div>
          </div>
        </div>

        {/* 凭证字段 */}
        <div className="bg-white border border-gray-200 rounded-lg">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="w-0.5 h-4 bg-blue-500 rounded-full block"></span>
              <span className="font-semibold text-sm">凭证字段</span>
              <span className="text-xs text-gray-400">动态渲染</span>
            </div>
            <button onClick={()=>showToast('字段配置管理（管理员）')} className="px-3 h-7 text-xs border border-gray-200 rounded-md hover:border-blue-400 hover:text-blue-500 text-gray-600 transition-colors">⚙ 管理字段</button>
          </div>
          {/* 完整度 */}
          <div className="px-5 py-3 border-b border-gray-100">
            <div className="flex items-center gap-4 bg-blue-50 border border-blue-100 rounded-lg px-4 py-2.5">
              <span className="text-xl font-bold text-green-600">{filled}</span><span className="text-xs text-gray-500">已填写</span>
              <span className="text-gray-300">|</span>
              <span className="text-xl font-bold text-gray-400">{fields.length-filled}</span><span className="text-xs text-gray-500">未填写</span>
              <span className="text-gray-300">|</span>
              <div className="flex-1 h-2 bg-blue-100 rounded-full overflow-hidden max-w-[180px]">
                <div className="h-full bg-blue-500 rounded-full" style={{width:`${pct}%`}}></div>
              </div>
              <span className="text-sm font-semibold text-blue-600">{filled}/{fields.length}</span>
            </div>
          </div>
          {/* 字段列表 */}
          <div className="divide-y divide-gray-100">
            {fields.map(f=>(
              <div key={f.key} className="flex items-start gap-4 px-5 py-3.5 hover:bg-gray-50 transition-colors">
                <div className="w-8 flex-shrink-0 pt-0.5">{f.required?<span className="text-red-400 text-sm">*</span>:<span className="text-xs text-gray-300">选填</span>}</div>
                <div className="w-28 flex-shrink-0 pt-0.5">
                  <div className="text-sm text-gray-600">{f.label}</div>
                  <div className="text-xs text-gray-400 font-mono mt-0.5">{f.key}</div>
                </div>
                <div className="flex-1 min-w-0">
                  {f.filled
                    ? <>
                        <div className={`text-sm ${f.sensitive?'font-mono text-gray-400 tracking-widest':'text-gray-900'}`}>{f.sensitive?'••••••••••••••••••••':f.value}</div>
                        <div className="text-xs text-gray-400 mt-1">{f.sensitive?'🔒 加密存储 · ':'明文展示 · '}最后更新 {f.updatedAt} · {f.operator} · v{f.version}</div>
                      </>
                    : <>
                        <div className="text-sm text-gray-300 italic">未填写</div>
                        <div className="text-xs text-gray-400 mt-1">{f.sensitive?'🔒 加密存储':'明文展示'} · 尚未录入</div>
                      </>
                  }
                </div>
                <div className="flex-shrink-0">
                  {f.filled
                    ? <button onClick={()=>{setCredModal(f);setInputVal('');}} className="px-3 h-7 text-xs border border-gray-200 rounded-md hover:border-blue-400 hover:text-blue-500 text-gray-500 transition-colors">重新填写</button>
                    : <button onClick={()=>{setCredModal(f);setInputVal('');}} className="px-3 h-7 text-xs bg-blue-500 hover:bg-blue-600 text-white rounded-md transition-colors">立即填写</button>
                  }
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {credModal && (
        <Modal title={`${credModal.filled?'重新填写':'填写'} · ${credModal.label}`} onClose={()=>setCredModal(null)}
          footer={<>
            <button onClick={()=>setCredModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md hover:bg-gray-50 text-gray-600">取消</button>
            <button onClick={()=>{
              if (!inputVal.trim()) { showToast('请输入内容'); return; }
              setFields(fs=>fs.map(f=>f.key===credModal.key?{...f,filled:true,updatedAt:new Date().toISOString().slice(0,10),operator:'张三',version:f.version+1}:f));
              setCredModal(null); setInputVal(''); showToast('✓ 凭证已加密写入','success');
            }} className="px-4 h-8 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-md">确认提交</button>
          </>}>
          <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs text-yellow-700 mb-3 flex gap-2">
            <span>⚠</span><span>提交后原值将被覆盖，<strong>无法还原</strong>。</span>
          </div>
          <div className="text-sm font-medium text-gray-700 mb-2">{credModal.label} <code className="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded">{credModal.key}</code></div>
          <input type={credModal.sensitive?'password':'text'}
            className={`w-full h-10 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 ${credModal.sensitive?'font-mono tracking-widest':''}`}
            placeholder={credModal.sensitive?'请输入密钥值...':'请输入值...'} value={inputVal} onChange={e=>setInputVal(e.target.value)} autoFocus/>
          <p className="text-xs text-gray-400 mt-2">{credModal.sensitive?'🔒 敏感字段，提交后以掩码展示，不存储明文。':'ℹ️ 非敏感字段，提交后明文展示。'}</p>
        </Modal>
      )}
    </main>
  );
}

// ── App Root ──────────────────────────────────────────
function App() {
  const [activeKey, setActiveKey] = useState('channels');
  const [detailRow, setDetailRow] = useState(null);
  const [toast, setToast] = useState({ msg:'', type:'' });
  const showToast = (msg, type='default') => { setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),2200); };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar activeKey={activeKey} onSelect={k=>{setActiveKey(k);setDetailRow(null);}}/>
      {detailRow
        ? <CredDetailPage channel={detailRow} onBack={()=>setDetailRow(null)} showToast={showToast}/>
        : activeKey==='channels'
          ? <ChannelListPage onViewDetail={setDetailRow} showToast={showToast}/>
          : <main className="flex-1 flex items-center justify-center"><div className="text-center text-gray-400"><div className="text-4xl mb-3">🚧</div><div className="text-sm">该模块开发中</div></div></main>
      }
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
