<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>账号凭证管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;" class="bg-gray-50 text-gray-800">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── 菜单 ──────────────────────────────────────────────
const MENU = [
  { group:'基础配置', items:[
    { key:'channels', label:'渠道账号信息', icon:'◈', active:true },
  ]},
];

// ── 渠道列表 Mock ──────────────────────────────────────
const INIT_CHANNELS = [
  { id:1, name:'Lapay',         type:'API',  intStatus:'connected', onlineStatus:'online',  docUrl:'https://docs.lapay.com/api', remark:'东南亚主力渠道', updatedAt:'2026-02-01', operator:'张三',
    fieldDefs:[
      { id:1, label:'商户号',   key:'merchant_no',          sensitive:false, required:true  },
      { id:2, label:'商户私钥', key:'merchant_private_key', sensitive:true,  required:true  },
      { id:3, label:'平台公钥', key:'platform_public_key',  sensitive:true,  required:true  },
    ],
    credRows:[
      { id:1, values:{ merchant_no:'LPY-8823-CNY', merchant_private_key:'', platform_public_key:'' }, remark:'人民币账户', updatedAt:'2026-02-01', operator:'张三' },
      { id:2, values:{ merchant_no:'LPY-9944-USD', merchant_private_key:'', platform_public_key:'' }, remark:'美元账户',   updatedAt:'2026-03-01', operator:'张三' },
    ]
  },
  { id:2, name:'PayPal',        type:'API',  intStatus:'connected', onlineStatus:'online',  docUrl:'https://developer.paypal.com', remark:'', updatedAt:'2026-01-20', operator:'李四', fieldDefs:[], credRows:[] },
  { id:3, name:'Stripe',        type:'API',  intStatus:'pending',   onlineStatus:'online',  docUrl:'https://stripe.com/docs',      remark:'', updatedAt:'2026-01-15', operator:'张三', fieldDefs:[], credRows:[] },
  { id:4, name:'SWIFT 银行转账', type:'SFTP', intStatus:'connected', onlineStatus:'offline', docUrl:'',                             remark:'仅限欧元结算', updatedAt:'2025-12-10', operator:'王五', fieldDefs:[], credRows:[] },
  { id:5, name:'Alipay HK',     type:'API',  intStatus:'unknown',   onlineStatus:'online',  docUrl:'',                             remark:'', updatedAt:'2026-01-08', operator:'李四', fieldDefs:[], credRows:[] },
  { id:6, name:'GrabPay',       type:'API',  intStatus:'pending',   onlineStatus:'unknown', docUrl:'',                             remark:'', updatedAt:'2026-03-01', operator:'张三', fieldDefs:[], credRows:[] },
  { id:7, name:'Payermax',      type:'API',  intStatus:'connected', onlineStatus:'online',  docUrl:'https://docs.payermax.com',    remark:'', updatedAt:'2026-02-18', operator:'王五', fieldDefs:[], credRows:[] },
  { id:8, name:'Unipin',        type:'SFTP', intStatus:'pending',   onlineStatus:'unknown', docUrl:'',                             remark:'', updatedAt:'2026-03-10', operator:'李四', fieldDefs:[], credRows:[] },
];

const INT_STATUS = {
  connected:{ label:'已接入', dot:'bg-green-500',             cls:'bg-green-50 text-green-700 border border-green-200' },
  pending:  { label:'接入中', dot:'bg-blue-500 animate-pulse',cls:'bg-blue-50  text-blue-600  border border-blue-200'  },
  unknown:  { label:'未知',   dot:'bg-gray-400',              cls:'bg-gray-100 text-gray-500  border border-gray-200'  },
};
const ONLINE_STATUS = {
  online: { label:'已上线', dot:'bg-green-500', cls:'bg-green-50 text-green-700 border border-green-200' },
  offline:{ label:'已下线', dot:'bg-gray-400',  cls:'bg-gray-100 text-gray-500  border border-gray-200'  },
  unknown:{ label:'未知',   dot:'bg-gray-400',  cls:'bg-gray-100 text-gray-500  border border-gray-200'  },
};
const PAGE_SIZE = 6;

function Badge({ map, status }) {
  const cfg = map[status] || Object.values(map).at(-1);
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${cfg.cls}`}><span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${cfg.dot}`}></span>{cfg.label}</span>;
}
function Modal({ title, onClose, children, footer, wide }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div className={`bg-white rounded-xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col ${wide?'w-[680px]':'w-[480px]'}`}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 flex-shrink-0">
          <span className="font-semibold text-gray-800">{title}</span>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">×</button>
        </div>
        <div className="px-5 py-4 overflow-y-auto flex-1">{children}</div>
        {footer && <div className="flex justify-end gap-2 px-5 py-3 border-t border-gray-100 bg-gray-50 flex-shrink-0">{footer}</div>}
      </div>
    </div>
  );
}
function Toast({ msg, type }) {
  if (!msg) return null;
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-2.5 rounded-lg shadow-lg z-[9999] ${type==='success'?'bg-green-600':'bg-gray-800'}`}>{msg}</div>;
}
function Sidebar({ activeKey, onSelect }) {
  return (
    <aside className="w-52 flex-shrink-0 flex flex-col h-screen bg-[#18181b]">
      <div className="flex items-center gap-2.5 px-4 py-4 border-b border-zinc-800">
        <div className="w-7 h-7 bg-blue-500 rounded-md flex items-center justify-center text-white text-sm">🔐</div>
        <span className="text-white text-sm font-semibold">账号凭证管理系统</span>
      </div>
      <nav className="flex-1 py-3">
        {MENU.map(({ group, items }) => (
          <div key={group} className="mb-2">
            <div className="px-4 py-1.5 text-xs font-medium text-zinc-600 uppercase tracking-wider">{group}</div>
            {items.map(item => {
              const active = item.key === activeKey;
              return (
                <button key={item.key} onClick={() => onSelect(item.key)}
                  className={`w-full flex items-center gap-2.5 px-4 py-2 text-sm transition-colors ${active?'bg-zinc-700 text-white':'text-zinc-400 hover:bg-zinc-800 hover:text-zinc-200'}`}>
                  <span className="w-5 text-center">{item.icon}</span>{item.label}
                  {active && <span className="ml-auto w-1 h-4 bg-blue-500 rounded-full"></span>}
                </button>
              );
            })}
          </div>
        ))}
      </nav>
      <div className="px-4 py-3 border-t border-zinc-800 flex items-center gap-2.5">
        <div className="w-7 h-7 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-semibold">张</div>
        <div><div className="text-zinc-200 text-xs font-medium">张三</div><div className="text-zinc-500 text-xs">财务运维</div></div>
      </div>
    </aside>
  );
}

function ChannelListPage({ channels, setChannels, onEnter, showToast }) {
  const [search, setSearch]   = useState('');
  const [fInt, setFInt]       = useState('');
  const [fOnline, setFOnline] = useState('');
  const [page, setPage]       = useState(1);
  const [modal, setModal]     = useState(null);
  const [editRow, setEditRow] = useState(null);

  const filtered = channels.filter(r => {
    if (search && !r.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (fInt    && r.intStatus    !== fInt)    return false;
    if (fOnline && r.onlineStatus !== fOnline) return false;
    return true;
  });
  const total = filtered.length, totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  const paginated = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  const confirmSave = () => {
    if (modal==='add') { const id=Math.max(...channels.map(r=>r.id))+1; setChannels(d=>[...d,{...editRow,id,fieldDefs:[],credRows:[],updatedAt:new Date().toISOString().slice(0,10),operator:'张三'}]); }
    else setChannels(d=>d.map(r=>r.id===editRow.id?{...r,...editRow}:r));
    setModal(null); showToast(modal==='add'?'✓ 渠道已新增':'✓ 已保存','success');
  };

  const stats = [
    {label:'渠道总数',  value:channels.length,                                    color:'text-gray-900',   sub:'第一阶段海外支付'},
    {label:'已接入',    value:channels.filter(c=>c.intStatus==='connected').length,color:'text-green-600',  sub:''},
    {label:'字段未配置',value:channels.filter(c=>c.fieldDefs.length===0).length,  color:'text-yellow-600', sub:'尚未配置字段'},
    {label:'已录入凭证',value:channels.filter(c=>c.credRows.length>0).length,     color:'text-blue-500',   sub:'已有凭证数据'},
  ];

  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-4 bg-white border-b border-gray-200 flex-shrink-0">
        <h1 className="text-base font-semibold">渠道账号信息</h1>
        <p className="text-xs text-gray-400 mt-0.5">点击渠道名称进入字段配置与凭证录入</p>
      </div>
      <div className="flex-1 overflow-auto px-6 py-4">
        <div className="grid grid-cols-4 gap-4 mb-4">
          {stats.map(s=>(
            <div key={s.label} className="bg-white border border-gray-200 rounded-lg px-4 py-3">
              <div className="text-xs text-gray-500 mb-1">{s.label}</div>
              <div className={`text-2xl font-bold ${s.color}`}>{s.value}<span className="text-sm font-normal text-gray-400 ml-1">个</span></div>
              {s.sub && <div className="text-xs text-gray-400 mt-0.5">{s.sub}</div>}
            </div>
          ))}
        </div>
        <div className="bg-white border border-gray-200 rounded-lg px-4 py-3 mb-3 flex flex-wrap items-center gap-3">
          <div className="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-md px-3 h-8 focus-within:border-blue-400 focus-within:bg-white">
            <span className="text-gray-400 text-sm">🔍</span>
            <input className="bg-transparent text-sm outline-none w-36 placeholder:text-gray-400" placeholder="搜索渠道名称..."
              value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}/>
          </div>
          {[
            {label:'接入状态',val:fInt,set:setFInt,opts:[['','全部'],['connected','已接入'],['pending','接入中'],['unknown','未知']]},
            {label:'上线状态',val:fOnline,set:setFOnline,opts:[['','全部'],['online','已上线'],['offline','已下线'],['unknown','未知']]},
          ].map(f=>(
            <div key={f.label} className="flex items-center gap-1.5">
              <span className="text-xs text-gray-500">{f.label}</span>
              <select className="h-8 border border-gray-200 rounded-md px-2 text-sm bg-white focus:outline-none focus:border-blue-400"
                value={f.val} onChange={e=>{f.set(e.target.value);setPage(1);}}>
                {f.opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          ))}
          {(search||fInt||fOnline) && <button onClick={()=>{setSearch('');setFInt('');setFOnline('');setPage(1);}} className="text-xs text-blue-500">重置</button>}
          <span className="ml-auto text-xs text-gray-400">共 {total} 条</span>
        </div>
        <div className="flex gap-2 mb-3">
          <button onClick={()=>{setEditRow({name:'',type:'API',intStatus:'pending',onlineStatus:'unknown',docUrl:'',remark:''});setModal('add');}}
            className="px-3 h-8 bg-blue-500 hover:bg-blue-600 text-white text-sm rounded-md">＋ 新增渠道</button>
          <button onClick={()=>showToast('已导出')} className="px-3 h-8 bg-white border border-gray-200 hover:border-blue-400 hover:text-blue-500 text-sm text-gray-600 rounded-md">↓ 导出</button>
        </div>
        <div className="bg-white border border-gray-200 rounded-lg overflow-hidden">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-50 border-b border-gray-200">
                {['渠道名称','接入类型','接入状态','上线状态','字段数','凭证条数','操作'].map(h=>(
                  <th key={h} className={`px-4 py-3 text-xs font-medium text-gray-500 uppercase tracking-wide ${h==='操作'?'text-right':'text-left'}`}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-100">
              {paginated.map(row=>(
                <tr key={row.id} className="hover:bg-gray-50 transition-colors cursor-pointer" onClick={()=>onEnter(row)}>
                  <td className="px-4 py-3">
                    <div className="font-medium text-blue-600 hover:underline">{row.name}</div>
                    {row.remark && <div className="text-xs text-gray-400 mt-0.5">{row.remark}</div>}
                  </td>
                  <td className="px-4 py-3"><span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded">{row.type}</span></td>
                  <td className="px-4 py-3"><Badge map={INT_STATUS} status={row.intStatus}/></td>
                  <td className="px-4 py-3"><Badge map={ONLINE_STATUS} status={row.onlineStatus}/></td>
                  <td className="px-4 py-3">
                    {row.fieldDefs.length===0
                      ? <span className="text-xs text-gray-300">未配置</span>
                      : <span className="text-xs font-medium text-gray-700">{row.fieldDefs.length} 个字段</span>}
                  </td>
                  <td className="px-4 py-3">
                    {row.credRows.length===0
                      ? <span className="text-xs text-gray-300">—</span>
                      : <span className="text-xs font-medium text-gray-700">{row.credRows.length} 条</span>}
                  </td>
                  <td className="px-4 py-3 text-right" onClick={e=>e.stopPropagation()}>
                    <div className="flex items-center justify-end gap-1">
                      <button onClick={()=>onEnter(row)} className="px-2.5 py-1 text-xs text-blue-500 hover:bg-blue-50 rounded">进入配置</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>{setEditRow({...row});setModal('edit');}} className="px-2.5 py-1 text-xs text-gray-500 hover:bg-gray-100 rounded">编辑</button>
                      <span className="text-gray-200">|</span>
                      <button onClick={()=>{setEditRow(row);setModal('delete');}} className="px-2.5 py-1 text-xs text-red-400 hover:bg-red-50 rounded">删除</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="flex items-center justify-between mt-3 px-1">
          <span className="text-xs text-gray-400">共 {total} 条</span>
          <div className="flex items-center gap-1">
            {[{l:'«',a:()=>setPage(1),d:page===1},{l:'‹',a:()=>setPage(p=>p-1),d:page===1}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 disabled:opacity-30 disabled:cursor-not-allowed hover:border-blue-400">{b.l}</button>
            ))}
            {Array.from({length:totalPages},(_,i)=>i+1).map(p=>(
              <button key={p} onClick={()=>setPage(p)} className={`w-8 h-8 flex items-center justify-center text-xs rounded border transition-colors ${p===page?'bg-blue-500 text-white border-blue-500':'border-gray-200 text-gray-600 hover:border-blue-400'}`}>{p}</button>
            ))}
            {[{l:'›',a:()=>setPage(p=>p+1),d:page===totalPages},{l:'»',a:()=>setPage(totalPages),d:page===totalPages}].map((b,i)=>(
              <button key={i} onClick={b.a} disabled={b.d} className="w-8 h-8 flex items-center justify-center text-xs rounded border border-gray-200 text-gray-500 disabled:opacity-30 disabled:cursor-not-allowed hover:border-blue-400">{b.l}</button>
            ))}
          </div>
        </div>
      </div>
      {(modal==='add'||modal==='edit') && (
        <Modal title={modal==='add'?'新增渠道':'编辑渠道'} onClose={()=>setModal(null)}
          footer={<><button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md text-gray-600">取消</button><button onClick={confirmSave} className="px-4 h-8 text-sm bg-blue-500 text-white rounded-md">确认</button></>}>
          <div className="space-y-3">
            {[{k:'name',label:'渠道名称',type:'text'},{k:'type',label:'接入类型',type:'text'},{k:'docUrl',label:'文档地址',type:'text'},{k:'remark',label:'备注',type:'text'}].map(f=>(
              <div key={f.k} className="flex flex-col gap-1"><label className="text-xs text-gray-500">{f.label}</label>
                <input type={f.type} className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400" value={editRow?.[f.k]||''} onChange={e=>setEditRow(r=>({...r,[f.k]:e.target.value}))}/>
              </div>
            ))}
            {[{k:'intStatus',label:'接入状态',opts:[{v:'connected',l:'已接入'},{v:'pending',l:'接入中'},{v:'unknown',l:'未知'}]},{k:'onlineStatus',label:'上线状态',opts:[{v:'online',l:'已上线'},{v:'offline',l:'已下线'},{v:'unknown',l:'未知'}]}].map(f=>(
              <div key={f.k} className="flex flex-col gap-1"><label className="text-xs text-gray-500">{f.label}</label>
                <select className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white" value={editRow?.[f.k]||''} onChange={e=>setEditRow(r=>({...r,[f.k]:e.target.value}))}>
                  {f.opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </div>
            ))}
          </div>
        </Modal>
      )}
      {modal==='delete' && (
        <Modal title="确认删除" onClose={()=>setModal(null)}
          footer={<><button onClick={()=>setModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md text-gray-600">取消</button><button onClick={()=>{setChannels(d=>d.filter(r=>r.id!==editRow.id));setModal(null);showToast('✓ 已删除','success');}} className="px-4 h-8 text-sm bg-red-500 text-white rounded-md">确认删除</button></>}>
          <p className="text-sm text-gray-600">确定删除 <strong>「{editRow?.name}」</strong> 吗？</p>
        </Modal>
      )}
    </main>
  );
}

function ChannelDetailPage({ channel, onSave, onBack, showToast }) {
  const [fieldDefs, setFieldDefs] = useState(channel.fieldDefs);
  const [credRows, setCredRows]   = useState(channel.credRows);
  const [addFieldModal, setAddFieldModal] = useState(false);
  const [newField, setNewField]           = useState({ label:'', key:'', sensitive:false, required:true });
  const [credModal, setCredModal] = useState(null);
  const [credForm, setCredForm]   = useState({});
  const [credRemark, setCredRemark] = useState('');

  const persist = (defs, rows) => {
    onSave({ ...channel, fieldDefs: defs, credRows: rows });
    showToast('✓ 已保存','success');
  };

  const addField = () => {
    if (!newField.label.trim()) { showToast('请填写字段名称'); return; }
    const key = newField.key.trim() || newField.label.trim().toLowerCase().replace(/\s+/g,'_');
    if (fieldDefs.find(f=>f.key===key)) { showToast('字段标识已存在'); return; }
    const id = fieldDefs.length ? Math.max(...fieldDefs.map(f=>f.id))+1 : 1;
    const updated = [...fieldDefs, { id, ...newField, key }];
    setFieldDefs(updated); setAddFieldModal(false); setNewField({ label:'', key:'', sensitive:false, required:true });
    persist(updated, credRows);
  };
  const removeField = (fid) => { const u=fieldDefs.filter(f=>f.id!==fid); setFieldDefs(u); persist(u, credRows); };
  const toggleSensitive = (fid) => { const u=fieldDefs.map(f=>f.id===fid?{...f,sensitive:!f.sensitive}:f); setFieldDefs(u); persist(u, credRows); };
  const toggleRequired = (fid) => { const u=fieldDefs.map(f=>f.id===fid?{...f,required:!f.required}:f); setFieldDefs(u); persist(u, credRows); };

  const openAddCred = () => { if (fieldDefs.length===0) { showToast('请先配置字段'); return; } setCredForm({}); setCredRemark(''); setCredModal({ mode:'add', row:null }); };
  const openEditCred = (row) => { setCredForm({ ...row.values }); setCredRemark(row.remark||''); setCredModal({ mode:'edit', row }); };
  const submitCred = () => {
    const now = new Date().toISOString().slice(0,10);
    let updated;
    if (credModal.mode==='add') { const id=credRows.length?Math.max(...credRows.map(r=>r.id))+1:1; updated=[...credRows,{id,values:{...credForm},remark:credRemark,updatedAt:now,operator:'张三'}]; }
    else { updated=credRows.map(r=>r.id===credModal.row.id?{...r,values:{...credForm},remark:credRemark,updatedAt:now}:r); }
    setCredRows(updated); setCredModal(null); persist(fieldDefs, updated);
  };
  const deleteCred = (rid) => { const u=credRows.filter(r=>r.id!==rid); setCredRows(u); persist(fieldDefs,u); showToast('✓ 已删除','success'); };

  return (
    <main className="flex-1 flex flex-col overflow-hidden">
      <div className="px-6 py-4 bg-white border-b border-gray-200 flex items-center gap-3 flex-shrink-0">
        <button onClick={onBack} className="text-gray-400 hover:text-blue-500 text-lg leading-none transition-colors">←</button>
        <div>
          <h1 className="text-base font-semibold">{channel.name}</h1>
          <p className="text-xs text-gray-400 mt-0.5">渠道管理 / {channel.name}</p>
        </div>
        <div className="ml-4 flex items-center gap-2">
          <Badge map={INT_STATUS} status={channel.intStatus}/>
          <Badge map={ONLINE_STATUS} status={channel.onlineStatus}/>
        </div>
        {channel.docUrl && (
          <a href={channel.docUrl} target="_blank" rel="noreferrer"
            className="ml-auto flex items-center gap-1 text-xs text-blue-500 hover:underline">
            📄 接入文档
          </a>
        )}
      </div>
      <div className="flex-1 overflow-auto px-6 py-4 space-y-5">
        <div className="bg-white border border-gray-200 rounded-lg">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="w-0.5 h-4 bg-blue-500 rounded-full block"></span>
              <span className="font-semibold text-sm">字段配置</span>
              <span className="text-xs text-gray-400">配置该渠道需要录入哪些字段，以及是否脱敏</span>
            </div>
            <button onClick={()=>{setNewField({label:'',key:'',sensitive:false,required:true});setAddFieldModal(true);}}
              className="flex items-center gap-1.5 px-3 h-7 text-xs bg-blue-500 hover:bg-blue-600 text-white rounded-md transition-colors">＋ 添加字段</button>
          </div>
          {fieldDefs.length===0 ? (
            <div className="px-5 py-8 text-center">
              <div className="text-3xl mb-2">📋</div>
              <div className="text-sm text-gray-400 mb-3">尚未配置字段</div>
              <button onClick={()=>{setNewField({label:'',key:'',sensitive:false,required:true});setAddFieldModal(true);}}
                className="px-4 h-8 text-sm border border-blue-200 text-blue-500 hover:bg-blue-50 rounded-md">添加第一个字段</button>
            </div>
          ) : (
            <div className="px-5 py-3">
              <div className="grid grid-cols-12 gap-3 px-3 py-1.5 text-xs text-gray-400 font-medium uppercase tracking-wide border-b border-gray-100 mb-1">
                <div className="col-span-3">字段名称</div><div className="col-span-3">字段标识</div>
                <div className="col-span-2 text-center">是否脱敏</div><div className="col-span-2 text-center">是否必填</div>
                <div className="col-span-2 text-right">操作</div>
              </div>
              <div className="space-y-1">
                {fieldDefs.map(f=>(
                  <div key={f.id} className="grid grid-cols-12 gap-3 items-center px-3 py-2.5 rounded-lg hover:bg-gray-50 transition-colors group">
                    <div className="col-span-3"><span className="text-sm font-medium text-gray-800">{f.label}</span>{f.required&&<span className="text-red-400 text-xs ml-1">*</span>}</div>
                    <div className="col-span-3"><code className="text-xs text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{f.key}</code></div>
                    <div className="col-span-2 flex justify-center">
                      <button onClick={()=>toggleSensitive(f.id)} className={`relative inline-flex items-center h-5 rounded-full w-9 transition-colors focus:outline-none ${f.sensitive?'bg-orange-400':'bg-gray-200'}`}>
                        <span className={`inline-block w-3.5 h-3.5 transform rounded-full bg-white shadow transition-transform ${f.sensitive?'translate-x-4':'translate-x-0.5'}`}></span>
                      </button>
                      <span className={`ml-1.5 text-xs ${f.sensitive?'text-orange-500':'text-gray-400'}`}>{f.sensitive?'掩码':'明文'}</span>
                    </div>
                    <div className="col-span-2 flex justify-center">
                      <button onClick={()=>toggleRequired(f.id)} className={`relative inline-flex items-center h-5 rounded-full w-9 transition-colors focus:outline-none ${f.required?'bg-blue-500':'bg-gray-200'}`}>
                        <span className={`inline-block w-3.5 h-3.5 transform rounded-full bg-white shadow transition-transform ${f.required?'translate-x-4':'translate-x-0.5'}`}></span>
                      </button>
                      <span className={`ml-1.5 text-xs ${f.required?'text-blue-500':'text-gray-400'}`}>{f.required?'必填':'选填'}</span>
                    </div>
                    <div className="col-span-2 flex justify-end">
                      <button onClick={()=>removeField(f.id)} className="px-2 py-1 text-xs text-red-400 hover:bg-red-50 rounded opacity-0 group-hover:opacity-100 transition-opacity">删除</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
        <div className="bg-white border border-gray-200 rounded-lg">
          <div className="px-5 py-3.5 border-b border-gray-100 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <span className="w-0.5 h-4 bg-green-500 rounded-full block"></span>
              <span className="font-semibold text-sm">凭证明细</span>
              <span className="text-xs text-gray-400">按上方字段录入凭证，可写多条</span>
              {credRows.length>0 && <span className="text-xs font-medium text-gray-600 bg-gray-100 px-2 py-0.5 rounded-full">{credRows.length} 条</span>}
            </div>
            <button onClick={openAddCred}
              className={`flex items-center gap-1.5 px-3 h-7 text-xs rounded-md transition-colors ${fieldDefs.length===0?'bg-gray-100 text-gray-400 cursor-not-allowed':'bg-green-500 hover:bg-green-600 text-white'}`}>
              ＋ 新增一条
            </button>
          </div>
          {fieldDefs.length===0 ? (
            <div className="px-5 py-6 text-center text-xs text-gray-300">请先完成字段配置，再录入凭证</div>
          ) : credRows.length===0 ? (
            <div className="px-5 py-8 text-center">
              <div className="text-3xl mb-2">🔑</div>
              <div className="text-sm text-gray-400 mb-3">暂无凭证记录</div>
              <button onClick={openAddCred} className="px-4 h-8 text-sm border border-green-200 text-green-600 hover:bg-green-50 rounded-md">新增第一条</button>
            </div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="bg-gray-50 border-b border-gray-200">
                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">#</th>
                    {fieldDefs.map(f=>(
                      <th key={f.key} className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">
                        <span>{f.label}</span>{f.sensitive&&<span className="ml-1 text-orange-400 text-xs">🔒</span>}
                      </th>
                    ))}
                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">备注</th>
                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">更新</th>
                    <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wide">操作</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {credRows.map((row,idx)=>(
                    <tr key={row.id} className="hover:bg-gray-50 transition-colors">
                      <td className="px-4 py-3 text-xs text-gray-400">{idx+1}</td>
                      {fieldDefs.map(f=>(
                        <td key={f.key} className="px-4 py-3">
                          {f.sensitive
                            ? <span className="font-mono text-sm text-gray-400 tracking-widest">••••••••</span>
                            : <span className="text-sm text-gray-800">{row.values[f.key]||<span className="text-gray-300 italic text-xs">未填写</span>}</span>
                          }
                        </td>
                      ))}
                      <td className="px-4 py-3">{row.remark?<span className="text-xs text-blue-500 bg-blue-50 px-2 py-0.5 rounded">{row.remark}</span>:<span className="text-xs text-gray-300">—</span>}</td>
                      <td className="px-4 py-3 text-xs text-gray-400">{row.updatedAt}<br/>{row.operator}</td>
                      <td className="px-4 py-3">
                        <div className="flex items-center justify-end gap-1">
                          <button onClick={()=>openEditCred(row)} className="px-2.5 py-1 text-xs text-blue-500 hover:bg-blue-50 rounded">编辑</button>
                          <span className="text-gray-200">|</span>
                          <button onClick={()=>deleteCred(row.id)} className="px-2.5 py-1 text-xs text-red-400 hover:bg-red-50 rounded">删除</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
      {addFieldModal && (
        <Modal title="添加字段" onClose={()=>setAddFieldModal(false)}
          footer={<><button onClick={()=>setAddFieldModal(false)} className="px-4 h-8 text-sm border border-gray-200 rounded-md text-gray-600">取消</button><button onClick={addField} className="px-4 h-8 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-md">确认添加</button></>}>
          <div className="space-y-3">
            <div className="flex flex-col gap-1">
              <label className="text-xs text-gray-500">字段名称 <span className="text-red-400">*</span></label>
              <input className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400" placeholder="如：商户号、商户私钥"
                value={newField.label} onChange={e=>setNewField(f=>({...f,label:e.target.value}))} autoFocus/>
            </div>
            <div className="flex flex-col gap-1">
              <label className="text-xs text-gray-500">字段标识（选填，留空自动生成）</label>
              <input className="h-9 border border-gray-200 rounded-md px-3 text-sm font-mono focus:outline-none focus:border-blue-400" placeholder="如：merchant_no"
                value={newField.key} onChange={e=>setNewField(f=>({...f,key:e.target.value}))}/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">是否脱敏</label>
                <select className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white"
                  value={newField.sensitive?'1':'0'} onChange={e=>setNewField(f=>({...f,sensitive:e.target.value==='1'}))}>
                  <option value="0">明文展示（不脱敏）</option><option value="1">掩码展示（脱敏）</option>
                </select>
              </div>
              <div className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">是否必填</label>
                <select className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 bg-white"
                  value={newField.required?'1':'0'} onChange={e=>setNewField(f=>({...f,required:e.target.value==='1'}))}>
                  <option value="1">必填</option><option value="0">选填</option>
                </select>
              </div>
            </div>
          </div>
        </Modal>
      )}
      {credModal && (
        <Modal title={credModal.mode==='add'?'新增凭证':'编辑凭证'} onClose={()=>setCredModal(null)}
          footer={<><button onClick={()=>setCredModal(null)} className="px-4 h-8 text-sm border border-gray-200 rounded-md text-gray-600">取消</button><button onClick={submitCred} className="px-4 h-8 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-md">确认提交</button></>}>
          {credModal.mode==='edit' && (
            <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-xs text-yellow-700 mb-3 flex gap-2">
              <span>⚠</span><span>脱敏字段修改后将覆盖原值，<strong>无法还原</strong>。</span>
            </div>
          )}
          <div className="space-y-3">
            {fieldDefs.map(f=>(
              <div key={f.key} className="flex flex-col gap-1">
                <label className="text-xs text-gray-500">
                  {f.label}{f.required&&<span className="text-red-400 ml-0.5">*</span>}
                  {f.sensitive&&<span className="text-orange-500 ml-1.5 text-xs bg-orange-50 border border-orange-200 px-1.5 py-0 rounded">脱敏</span>}
                </label>
                <input type={f.sensitive?'password':'text'}
                  className={`h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400 ${f.sensitive?'font-mono tracking-widest':''}`}
                  placeholder={f.sensitive?'请输入…（提交后不可查看）':'请输入…'}
                  value={credForm[f.key]||''} onChange={e=>setCredForm(fm=>({...fm,[f.key]:e.target.value}))}/>
              </div>
            ))}
            <div className="flex flex-col gap-1">
              <label className="text-xs text-gray-500">备注（可选）</label>
              <input className="h-9 border border-gray-200 rounded-md px-3 text-sm focus:outline-none focus:border-blue-400"
                placeholder="如：生产环境、人民币账户…" value={credRemark} onChange={e=>setCredRemark(e.target.value)}/>
            </div>
          </div>
        </Modal>
      )}
    </main>
  );
}

function App() {
  const [activeKey, setActiveKey]   = useState('channels');
  const [channels, setChannels]     = useState(INIT_CHANNELS);
  const [currentChannel, setCurrentChannel] = useState(null);
  const [toast, setToast]           = useState({ msg:'', type:'' });
  const showToast = (msg, type='default') => { setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),2200); };
  const handleSaveChannel = (updated) => { setChannels(cs=>cs.map(c=>c.id===updated.id?updated:c)); setCurrentChannel(updated); };
  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar activeKey={activeKey} onSelect={k=>{setActiveKey(k);setCurrentChannel(null);}}/>
      {currentChannel
        ? <ChannelDetailPage channel={currentChannel} onSave={handleSaveChannel} onBack={()=>setCurrentChannel(null)} showToast={showToast}/>
        : activeKey==='channels'
          ? <ChannelListPage channels={channels} setChannels={setChannels} onEnter={c=>{setCurrentChannel(c);}} showToast={showToast}/>
          : <main className="flex-1 flex items-center justify-center"><div className="text-center text-gray-400"><div className="text-4xl mb-2">🚧</div><div className="text-sm">该模块开发中</div></div></main>
      }
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
